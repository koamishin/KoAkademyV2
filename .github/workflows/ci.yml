name: CI

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_ENV: testing
  APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  CACHE_STORE: array
  DB_CONNECTION: sqlite
  DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
  MAIL_MAILER: array
  QUEUE_CONNECTION: sync
  SESSION_DRIVER: array

jobs:
  php-quality:
    name: PHP Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Prepare application
        run: |
          cp .env.example .env
          touch database/database.sqlite

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Check PHP formatting
        run: composer test:lint

      - name: Run static analysis
        run: vendor/bin/phpstan analyse app/Academic/AcademicModuleRegistry.php app/Actions/Setup --memory-limit=2G --no-progress

      - name: Check Rector rules
        run: composer rector

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Prepare application
        run: |
          cp .env.example .env
          touch database/database.sqlite

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Run Pest
        run: php -d memory_limit=1G vendor/bin/pest --compact

  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Prepare application
        run: |
          cp .env.example .env
          touch database/database.sqlite

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Check frontend formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Build production assets
        run: npm run build
